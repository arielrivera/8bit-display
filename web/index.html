<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>8bit-display</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>8bit-display</h1>
        <div class="actions">
          <button id="connect">Connect</button>
          <button id="disconnect" disabled>Disconnect</button>
        </div>
      </header>

      <section class="status">
        <span id="device-status">Not connected</span>
        <span id="mode-status"></span>
      </section>

      <section class="controls">
        <label>
          Mode
          <select id="mode">
            <option value="carousel">Carousel</option>
            <option value="single">Single image</option>
            <option value="clock">Clock</option>
          </select>
        </label>
        <label>
          Seconds
          <input id="seconds" type="number" min="5" step="5" value="300" />
        </label>
        <label>
          Image
          <select id="image"></select>
        </label>
        <label>
          Clock style
          <select id="clock-style">
            <option value="digital">Digital</option>
            <option value="pixel-art">Pixel art</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="clock-24h" type="checkbox" />
          24-hour
        </label>
      </section>

      <section class="actions transport">
        <button id="send-now" disabled>Send now</button>
        <button id="start" disabled>Start</button>
        <button id="stop" disabled>Stop</button>
        <button id="power-off" disabled>Power off</button>
        <button id="power-on" disabled>Power on</button>
      </section>

      <section class="preview-wrap">
        <canvas id="preview" width="16" height="16"></canvas>
      </section>

      <section>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
