device:
  name: "MI Matrix Display"
  backend: "native-ble"
  gamma: 0.6
  save: true

paths:
  image_folder: "./images"
  state_file: "./state.json"

mode:
  type: "clock"
  carousel_seconds: 120
  single_image: "./images/heart.png"
  clock_style: "pixel-art"
  clock_24h: false

